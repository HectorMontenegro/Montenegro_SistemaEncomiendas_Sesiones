{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 400px;
        margin: 2rem auto;
    }
    .login-logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-logo i {
        font-size: 4rem;
        color: var(--color-primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-logo">
        <i class="fas fa-box-open"></i>
        <h2 class="mt-3">Sistema de Encomiendas</h2>
        <p class="text-muted">Ingrese sus credenciales para acceder</p>
    </div>
    
    <div class="card shadow">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <p class="text-center mt-3 text-muted">
        <small>¿No tienes cuenta? Contacta al administrador.</small>
    </p>
</div>
{% endblock %}
