{% extends 'base.html' %}
{% load socialaccount %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 2rem auto;">
    <div class="text-center mb-4">
        <i class="fas fa-box-open fa-3x text-primary"></i>
        <h2 class="mt-3">Sistema de Encomiendas</h2>
    </div>
    
    <div class="card shadow">
        <div class="card-body p-4">
            <!-- Formulario tradicional -->
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                </button>
            </form>
            
            <hr class="my-4">
            
            <!-- OAuth -->
            <div class="text-center">
                <p class="text-muted small mb-3">O continúa con</p>
                <div class="d-grid gap-2">
                    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger">
                        <i class="fab fa-google me-2"></i>Google
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
