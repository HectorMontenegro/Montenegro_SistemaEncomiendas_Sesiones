# redis.conf — optimizado para Django Channels
bind 0.0.0.0
port 6379
tcp-keepalive 60

# Memoria
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistencia RDB (suficiente para Channels)
save 900 1
save 300 10
save 60 10000
dbfilename encomiendas-dump.rdb
dir /data
stop-writes-on-bgsave-error yes
rdbcompression yes
appendonly no

# Logs
loglevel notice
logfile ''

# Bases de datos
databases 16

# Timeouts
timeout 0
tcp-backlog 511
